<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Perina Legal</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fbf7f3;
      --surface: #ffffff;
      --text: #211a1d;
      --muted: #776a70;
      --line: #e9ded8;
      --primary: #c75d82;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #fff0f5, var(--bg), #eef8f3);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px;
    }
    section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(75, 32, 50, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
    }
    a {
      display: block;
      margin: 12px 0;
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Perina Legal</h1>
      <p>Legal pages for Perina, an AI perimenopause companion app.</p>
      <a href="./privacy.html">Privacy Policy</a>
      <a href="./terms.html">Terms of Use</a>
    </section>
  </main>
</body>
</html>
